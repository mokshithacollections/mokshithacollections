# Bring up the whole app + database with: docker compose up --build
#
# Persisted volumes:
#   postgres_data  → DB rows survive `docker compose down` (use -v to wipe)
#   uploads_data   → product images uploaded via /admin survive restarts
#
# Override any of the *_PASSWORD / *_KEY values via a local .env file
# next to this docker-compose.yml (gitignored).

services:
  postgres:
    image: postgres:16-alpine
    container_name: mokshitha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mokshitha_collections}
      POSTGRES_USER: ${POSTGRES_USER:-mokshitha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mokshitha_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mokshitha} -d ${POSTGRES_DB:-mokshitha_collections}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mokshitha-collections:latest
    container_name: mokshitha-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Profile + server
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8081

      # Datasource — `postgres` is the service name above, resolvable on
      # the default compose network.
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mokshitha_collections}
      DB_USERNAME: ${POSTGRES_USER:-mokshitha}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-mokshitha_dev_password}

      # Hibernate auto-creates schema in dev. Switch to `validate` in prod
      # once you wire migrations (Flyway/Liquibase).
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}

      # Spring Security
      REMEMBER_ME_KEY: ${REMEMBER_ME_KEY:-dev-only-replace-in-prod-at-least-32-chars}

      # Admin seeder — set BEFORE the first run to override the default admin.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@mokshitha.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe!2026}

      # Image storage
      UPLOADS_ROOT: /app/uploads

      # JVM tunables (e.g. JAVA_OPTS=-Xmx512m)
      JAVA_OPTS: ${JAVA_OPTS:-}
    ports:
      - "${APP_HOST_PORT:-8081}:8081"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
