# Prod profile overrides — loaded when spring.profiles.active=prod
spring.jpa.show-sql=false
# Never auto-update schema in prod — use migrations (Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=validate
spring.thymeleaf.cache=true
# Cookies must be HTTPS-only in prod
server.servlet.session.cookie.secure=true
# Strict-Transport-Security header — only safe to enable when actually on HTTPS.
app.security.hsts-enabled=true
logging.level.org.springframework.security=INFO
logging.level.com.ec.mokshitha_collections=INFO
