spring.application.name=mokshitha_collections

# Console log pattern: include request id (rid) from MDC so a single request
# flow can be grepped across the log. Falls back to "-" when outside a request.
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [rid=%X{rid:--}] %logger{36} - %msg%n

# Active profile (set to "prod" in production via SPRING_PROFILES_ACTIVE env var)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server
server.port=${SERVER_PORT:8080}
# Forward client IP / proto when behind a reverse proxy (nginx, ALB)
server.forward-headers-strategy=framework

# Datasource (credentials must come from env vars in real deployments)
#spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mokshitha_collections}
#spring.datasource.username=${DB_USERNAME:postgres}
#spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.url=${DB_URL: jdbc:postgresql://ep-rapid-credit-a8muwepc-pooler.eastus2.azure.neon.tech/akshitha_db?sslmode=require}
spring.datasource.username=${DB_USERNAME:akshitha_db_owner}
spring.datasource.password=${DB_PASSWORD:npg_JZ3NAg2xBplh}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Session cookie hardening
server.servlet.session.cookie.name=MC_SESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
# Set to true behind HTTPS (prod profile overrides this)
server.servlet.session.cookie.secure=false
server.servlet.session.timeout=30m

# Hide server header
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Thymeleaf — disable cache only in dev (overridden in prod)
spring.thymeleaf.cache=true

# Multipart (image uploads)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# Local image storage (admin uploads)
app.uploads.root=${UPLOADS_ROOT:./uploads}
app.uploads.url-prefix=/uploads
