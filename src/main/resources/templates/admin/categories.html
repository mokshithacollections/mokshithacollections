<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/_layout :: head('Categories')}"></head>
<body>
<div class="admin-shell">
    <aside th:replace="~{admin/_layout :: sidebar('categories')}"></aside>

    <main class="admin-main">
        <div class="admin-page-header">
            <div>
                <h1>Categories</h1>
                <div class="breadcrumb"
                     th:text="${#lists.size(categories)} + ' categories'">0 categories</div>
            </div>
            <a class="btn btn-primary" th:href="@{/admin/categories/new}">
                <i class="fas fa-plus"></i> New category
            </a>
        </div>

        <div class="table-wrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Slug</th>
                        <th>Parent</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${categories}">
                        <td>
                            <a th:href="@{/admin/categories/{id}(id=${c.categoryId})}"
                               th:text="${c.name}" style="font-weight:500;">Name</a>
                        </td>
                        <td><code th:text="${c.slug}">slug</code></td>
                        <td>
                            <span th:if="${c.parentId != null}" th:text="${c.parentId}">—</span>
                            <span th:unless="${c.parentId != null}" style="color:#bbb;">—</span>
                        </td>
                        <td th:text="${c.description != null ? #strings.abbreviate(c.description, 60) : '—'}">—</td>
                        <td>
                            <span th:if="${c.isActive != null and c.isActive}" class="pill pill-active">Active</span>
                            <span th:unless="${c.isActive != null and c.isActive}" class="pill"
                                  style="background:#eee;color:#888;">Inactive</span>
                        </td>
                        <td style="white-space:nowrap;">
                            <a class="btn btn-outline btn-sm"
                               th:href="@{/admin/categories/{id}(id=${c.categoryId})}">Edit</a>
                            <button type="button" class="btn btn-outline btn-sm"
                                    th:attr="data-id=${c.categoryId}, data-active=${c.isActive}"
                                    th:text="${c.isActive != null and c.isActive} ? 'Deactivate' : 'Activate'"
                                    onclick="onToggleActive(this)">Deactivate</button>
                            <button type="button" class="btn btn-danger btn-sm"
                                    th:attr="data-id=${c.categoryId}, data-name=${c.name}"
                                    onclick="onRemove(this)">Remove</button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td class="empty-row" colspan="6">
                            No categories yet. <a th:href="@{/admin/categories/new}">Create one</a>.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<div th:replace="~{admin/_layout :: scripts}"></div>
<script>
    // Flip Active/Inactive via explicit activate/deactivate endpoints.
    function onToggleActive(btn) {
        const id = btn.dataset.id;
        const isActive = btn.dataset.active === 'true';
        const path = isActive ? 'deactivate' : 'activate';
        adminApi('POST', '/api/admin/categories/' + id + '/' + path)
            .then(() => {
                toast(isActive ? 'Category deactivated' : 'Category activated', 'success');
                setTimeout(() => location.reload(), 500);
            })
            .catch(e => toast(e.message, 'error'));
    }

    // Permanent hard delete — removes the category AND every product under it.
    function onRemove(btn) {
        const id = btn.dataset.id;
        const name = btn.dataset.name;
        confirmThen('Permanently DELETE category "' + name + '" AND all products under it?\n\nEach product\'s variants, images and reviews are removed too. Past orders are unaffected. This cannot be undone.', async () => {
            try {
                await adminApi('DELETE', '/api/admin/categories/' + id);
                toast('Category and its products deleted', 'success');
                setTimeout(() => location.reload(), 700);
            } catch (e) { toast(e.message, 'error'); }
        });
    }
</script>
</body>
</html>
