# H2 in-memory DB in PostgreSQL compatibility mode so the production
# JPA mappings (TEXT columns, etc.) work without changes.
spring.datasource.url=jdbc:h2:mem:mokshitha_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate against the PG dialect (matches prod). H2's PG mode handles it.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Don't issue HTTPS-only cookies in tests over plain HTTP.
server.servlet.session.cookie.secure=false

# Faster BCrypt for tests so the suite finishes quickly.
# (We override the encoder via a @TestConfiguration where needed.)

# Disable the prod-only AdminSeeder warnings being noisy.
logging.level.com.ec.mokshitha_collections=WARN
